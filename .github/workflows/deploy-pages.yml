name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/english-learning-app-bdmpaw"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 진행 (진행 중인 배포는 취소하지 않음)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (앱 파일만 배포)
        run: |
          mkdir -p _site
          cp index.html manifest.json sw.js _site/
          cp icon-192.png icon-512.png icon-maskable-512.png _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
